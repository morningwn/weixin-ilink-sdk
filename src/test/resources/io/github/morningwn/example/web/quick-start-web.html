<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iLink Web Quick Start</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap");

    :root {
      --bg: #f2ece0;
      --panel: #fffaf1;
      --ink: #1d1b18;
      --accent: #d95f2e;
      --accent-2: #0b8f7b;
      --line: #e6d8c0;
      --muted: #6f6558;
      --ok: #187c52;
      --warn: #9c3a1b;
      --shadow: 0 14px 30px rgba(28, 18, 8, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% -10%, #ffe2bf 0, transparent 45%),
        radial-gradient(circle at 110% 20%, #ffd4cc 0, transparent 40%),
        var(--bg);
      font-family: "Space Grotesk", "PingFang SC", "Hiragino Sans GB", sans-serif;
      min-height: 100vh;
    }

    .page {
      width: min(1200px, 94vw);
      margin: 24px auto 48px;
      display: grid;
      gap: 16px;
      grid-template-columns: 1fr;
    }

    .hero {
      background: linear-gradient(120deg, #fffaf1, #fef1dc 60%, #ffe6d7);
      border: 2px solid #e7d4b8;
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 18px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .title {
      font-size: clamp(24px, 5vw, 34px);
      font-weight: 700;
      letter-spacing: 0.02em;
      margin: 0;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: "IBM Plex Mono", monospace;
      border: 1px solid #d6c4a6;
      border-radius: 999px;
      padding: 8px 12px;
      background: #fffaf1;
      font-size: 12px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #aaa;
    }

    .dot.online {
      background: var(--ok);
      box-shadow: 0 0 0 6px rgba(24, 124, 82, 0.18);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 420px) minmax(0, 1fr);
      gap: 16px;
    }

    .panel {
      border: 1.5px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel > header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, #fff8eb, #fff3df);
    }

    .panel > header h2 {
      font-size: 16px;
      margin: 0;
    }

    .panel-content {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .qr-wrap {
      border: 1px dashed #d5bf9a;
      border-radius: 14px;
      min-height: 210px;
      display: grid;
      place-items: center;
      padding: 14px;
      background: #fffdf8;
    }

    .qr-wrap img {
      max-width: 210px;
      width: min(100%, 210px);
      border-radius: 12px;
      border: 1px solid #efd7b4;
      background: #fff;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    textarea,
    input[type="file"] {
      width: 100%;
      border-radius: 10px;
      border: 1.5px solid #dbc7a7;
      background: #fff;
      padding: 10px;
      color: var(--ink);
      font-family: "Space Grotesk", "PingFang SC", sans-serif;
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease;
      box-shadow: 0 8px 14px rgba(217, 95, 46, 0.28);
    }

    button.alt {
      background: var(--accent-2);
      box-shadow: 0 8px 14px rgba(11, 143, 123, 0.24);
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .log {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 8px;
      max-height: 56vh;
      overflow: auto;
    }

    .log-item {
      border: 1px solid #e7d6bc;
      border-radius: 12px;
      padding: 10px 12px;
      background: #fff;
      display: grid;
      gap: 4px;
    }

    .meta {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .chip {
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      border-radius: 999px;
      padding: 2px 8px;
      background: #f6e8d2;
      color: #704b27;
      border: 1px solid #dfc7a5;
    }

    .log-item.system .chip {
      background: #e6f7f4;
      border-color: #b6e5dc;
      color: #0d6b5d;
    }

    .content {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
      font-size: 14px;
    }

    .preview-block {
      border: 1px solid #ecd9bc;
      border-radius: 10px;
      background: #fffdf8;
      padding: 8px;
      display: grid;
      gap: 8px;
    }

    .preview-image {
      max-width: 320px;
      width: min(100%, 320px);
      border-radius: 8px;
      border: 1px solid #e9d5b6;
      background: #fff;
    }

    .preview-audio {
      width: min(100%, 320px);
    }

    .preview-frame {
      width: 100%;
      min-height: 180px;
      border: 1px solid #e8d3b1;
      border-radius: 8px;
      background: #fff;
    }

    .download-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 8px;
      max-height: 240px;
      overflow: auto;
    }

    .download-list li {
      border: 1px solid #e8d7bd;
      border-radius: 10px;
      padding: 8px 10px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      background: #fff;
      font-size: 13px;
    }

    a {
      color: #0f6f9b;
      text-decoration: none;
      border-bottom: 1px dotted currentColor;
    }

    a:hover {
      opacity: 0.8;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      background: #2f2416;
      color: #fff5e9;
      border-radius: 12px;
      padding: 10px 14px;
      box-shadow: 0 16px 28px rgba(0, 0, 0, 0.22);
      opacity: 0;
      transform: translateY(8px);
      pointer-events: none;
      transition: 180ms ease;
      max-width: min(420px, 90vw);
      font-size: 13px;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .log {
        max-height: 42vh;
      }
    }
  </style>
</head>
<body>
<div class="page">
  <section class="hero">
    <div>
      <h1 class="title">微信 iLink Web 控制台</h1>
      <p class="subtitle">扫码登录后可发送文本、图片、文件，并自动接收媒体到本地目录。</p>
    </div>
    <div class="badge">
      <span id="statusDot" class="dot"></span>
      <span id="statusText">连接中...</span>
    </div>
  </section>

  <div class="layout">
    <section class="panel">
      <header>
        <h2>登录与发送</h2>
        <span id="targetBadge" class="chip">暂无回复目标</span>
      </header>
      <div class="panel-content">
        <div class="qr-wrap" id="qrWrap">
          <p class="hint">等待二维码...</p>
        </div>
        <p class="hint" id="sessionInfo">正在获取登录状态</p>

        <div class="field">
          <label for="textToSend">发送文本</label>
          <textarea id="textToSend" placeholder="输入后点击“发送文本”"></textarea>
        </div>
        <div class="row">
          <button id="sendTextBtn">发送文本</button>
        </div>

        <div class="field">
          <label for="imageInput">发送图片</label>
          <input id="imageInput" type="file" accept="image/*">
        </div>
        <div class="row">
          <button class="alt" id="sendImageBtn">发送图片</button>
        </div>

        <div class="field">
          <label for="fileInput">发送文件</label>
          <input id="fileInput" type="file">
        </div>
        <div class="row">
          <button class="alt" id="sendFileBtn">发送文件</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <header>
        <h2>消息与下载</h2>
        <span class="chip">自动刷新</span>
      </header>
      <div class="panel-content">
        <ul class="log" id="eventList"></ul>

        <h3 style="margin:4px 0 0; font-size:14px; color:var(--muted);">本地下载文件</h3>
        <ul class="download-list" id="downloadList"></ul>
      </div>
    </section>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const state = {
    lastEventId: 0,
    downloadsDir: ""
  };

  const statusDot = document.getElementById("statusDot");
  const statusText = document.getElementById("statusText");
  const targetBadge = document.getElementById("targetBadge");
  const qrWrap = document.getElementById("qrWrap");
  const sessionInfo = document.getElementById("sessionInfo");
  const eventList = document.getElementById("eventList");
  const downloadList = document.getElementById("downloadList");
  const toast = document.getElementById("toast");

  const textToSend = document.getElementById("textToSend");
  const imageInput = document.getElementById("imageInput");
  const fileInput = document.getElementById("fileInput");
  const sendTextBtn = document.getElementById("sendTextBtn");
  const sendImageBtn = document.getElementById("sendImageBtn");
  const sendFileBtn = document.getElementById("sendFileBtn");

  sendTextBtn.addEventListener("click", sendText);
  sendImageBtn.addEventListener("click", sendImage);
  sendFileBtn.addEventListener("click", sendFile);

  bootstrap();

  async function bootstrap() {
    await refreshAll();
    setInterval(refreshAll, 1500);
  }

  async function refreshAll() {
    await Promise.all([refreshState(), refreshEvents(), refreshDownloads()]);
  }

  async function refreshState() {
    const data = await getJson("/api/state");
    if (!data) {
      return;
    }

    state.downloadsDir = data.downloadsDir || "";

    if (data.loggedIn) {
      statusDot.classList.add("online");
      statusText.textContent = "已登录";
    } else {
      statusDot.classList.remove("online");
      statusText.textContent = "等待扫码";
    }

    if (data.latestReplyUserId) {
      targetBadge.textContent = "回复目标: " + data.latestReplyUserId;
    } else {
      targetBadge.textContent = "暂无回复目标";
    }

    if (data.loggedIn) {
      qrWrap.innerHTML = "<p class=\"hint\">已登录，无需扫码。</p>";
      const accountPart = data.accountId ? (" bot=" + data.accountId) : "";
      const userPart = data.userId ? (" user=" + data.userId) : "";
      sessionInfo.textContent = "会话已就绪。" + accountPart + userPart;
    } else if (data.qrCodeImgContent) {
      const safeSrc = escapeHtml(data.qrCodeImgContent);
      qrWrap.innerHTML = "<img src=\"" + safeSrc + "\" alt=\"qrcode\">";
      sessionInfo.textContent = "请用微信扫描二维码完成登录。";
    } else {
      qrWrap.innerHTML = "<p class=\"hint\">正在生成二维码...</p>";
      sessionInfo.textContent = "首次启动需要等待 SDK 拉起二维码登录流程。";
    }
  }

  async function refreshEvents() {
    const data = await getJson("/api/events?afterId=" + encodeURIComponent(String(state.lastEventId)));
    if (!data || !Array.isArray(data.items)) {
      return;
    }

    for (const item of data.items) {
      renderEvent(item);
      if (typeof item.id === "number") {
        state.lastEventId = Math.max(state.lastEventId, item.id);
      }
    }
  }

  async function refreshDownloads() {
    const data = await getJson("/api/downloads");
    if (!data || !Array.isArray(data.items)) {
      return;
    }

    downloadList.innerHTML = "";
    if (data.items.length === 0) {
      const li = document.createElement("li");
      li.textContent = "暂无文件。收到图片/语音/文件后会自动下载到本地。";
      downloadList.appendChild(li);
      return;
    }

    for (const item of data.items) {
      const li = document.createElement("li");
      const name = document.createElement("span");
      name.textContent = item.name || "unknown";

      const right = document.createElement("span");
      const size = typeof item.size === "number" && item.size >= 0 ? formatBytes(item.size) : "-";
      right.textContent = size + " ";

      const link = document.createElement("a");
      link.href = item.downloadUrl;
      link.textContent = "下载";
      link.target = "_blank";
      right.appendChild(link);

      li.appendChild(name);
      li.appendChild(right);
      downloadList.appendChild(li);
    }
  }

  async function sendText() {
    const text = textToSend.value.trim();
    if (!text) {
      notify("请输入文本内容");
      return;
    }
    sendTextBtn.disabled = true;
    try {
      await postJson("/api/send/text", { text });
      textToSend.value = "";
      notify("文本已发送");
    } catch (err) {
      notify(extractError(err));
    } finally {
      sendTextBtn.disabled = false;
    }
  }

  async function sendImage() {
    const file = imageInput.files && imageInput.files[0];
    if (!file) {
      notify("请选择图片文件");
      return;
    }
    sendImageBtn.disabled = true;
    try {
      const payload = await fileToPayload(file);
      await postJson("/api/send/image", payload);
      imageInput.value = "";
      notify("图片已发送");
    } catch (err) {
      notify(extractError(err));
    } finally {
      sendImageBtn.disabled = false;
    }
  }

  async function sendFile() {
    const file = fileInput.files && fileInput.files[0];
    if (!file) {
      notify("请选择文件");
      return;
    }
    sendFileBtn.disabled = true;
    try {
      const payload = await fileToPayload(file);
      await postJson("/api/send/file", payload);
      fileInput.value = "";
      notify("文件已发送");
    } catch (err) {
      notify(extractError(err));
    } finally {
      sendFileBtn.disabled = false;
    }
  }

  async function fileToPayload(file) {
    const buffer = await file.arrayBuffer();
    return {
      name: file.name,
      contentBase64: arrayBufferToBase64(buffer)
    };
  }

  function renderEvent(item) {
    const li = document.createElement("li");
    li.className = "log-item" + (item.direction === "system" ? " system" : "");

    const meta = document.createElement("div");
    meta.className = "meta";

    const chip = document.createElement("span");
    chip.className = "chip";
    chip.textContent = (item.direction || "?") + "/" + (item.kind || "?");

    const time = document.createElement("span");
    time.textContent = item.time || "";

    meta.appendChild(chip);
    meta.appendChild(time);

    if (item.fromUserId) {
      const from = document.createElement("span");
      from.textContent = "from: " + item.fromUserId;
      meta.appendChild(from);
    }

    const content = document.createElement("div");
    content.className = "content";
    content.textContent = item.content || "";

    li.appendChild(meta);
    li.appendChild(content);

    const previewNode = createPreviewNode(item);
    if (previewNode) {
      li.appendChild(previewNode);
    }

    if (item.downloadUrl) {
      const link = document.createElement("a");
      link.href = item.downloadUrl;
      link.target = "_blank";
      link.textContent = "下载本地文件: " + (item.fileName || "file");
      li.appendChild(link);
    }

    eventList.appendChild(li);
    eventList.scrollTop = eventList.scrollHeight;
  }

  function createPreviewNode(item) {
    if (!item || !item.previewUrl || !item.kind) {
      return null;
    }

    const wrap = document.createElement("div");
    wrap.className = "preview-block";

    if (item.kind === "image") {
      const img = document.createElement("img");
      img.className = "preview-image";
      img.src = item.previewUrl;
      img.alt = item.fileName || "image";
      wrap.appendChild(img);
      return wrap;
    }

    if (item.kind === "voice") {
      const audio = document.createElement("audio");
      audio.className = "preview-audio";
      audio.controls = true;
      audio.src = item.previewUrl;
      wrap.appendChild(audio);
      return wrap;
    }

    if (item.kind === "file") {
      const ext = getExt(item.fileName || "");
      if (!isRenderableFileExt(ext)) {
        return null;
      }
      const frame = document.createElement("iframe");
      frame.className = "preview-frame";
      frame.src = item.previewUrl;
      frame.loading = "lazy";
      frame.referrerPolicy = "no-referrer";
      frame.sandbox = "allow-same-origin";
      wrap.appendChild(frame);
      return wrap;
    }

    return null;
  }

  function getExt(fileName) {
    const index = fileName.lastIndexOf(".");
    if (index < 0 || index === fileName.length - 1) {
      return "";
    }
    return fileName.slice(index + 1).toLowerCase();
  }

  function isRenderableFileExt(ext) {
    return ["txt", "md", "json", "xml", "csv", "pdf", "png", "jpg", "jpeg", "gif", "webp"].includes(ext);
  }

  async function getJson(url) {
    try {
      const resp = await fetch(url, { method: "GET" });
      if (!resp.ok) {
        throw await toHttpError(resp);
      }
      return await resp.json();
    } catch (err) {
      console.error(err);
      return null;
    }
  }

  async function postJson(url, payload) {
    const resp = await fetch(url, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });
    if (!resp.ok) {
      throw await toHttpError(resp);
    }
    return await resp.json();
  }

  async function toHttpError(resp) {
    let body;
    try {
      body = await resp.json();
    } catch {
      body = null;
    }
    const err = new Error(body && body.error ? body.error : ("HTTP " + resp.status));
    err.status = resp.status;
    return err;
  }

  function extractError(err) {
    if (!err) {
      return "请求失败";
    }
    return err.message || "请求失败";
  }

  function arrayBufferToBase64(arrayBuffer) {
    const bytes = new Uint8Array(arrayBuffer);
    const chunk = 0x8000;
    let binary = "";
    for (let i = 0; i < bytes.length; i += chunk) {
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
    }
    return btoa(binary);
  }

  function notify(msg) {
    toast.textContent = msg;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 1800);
  }

  function formatBytes(bytes) {
    if (bytes < 1024) {
      return bytes + " B";
    }
    const units = ["KB", "MB", "GB"];
    let value = bytes / 1024;
    let index = 0;
    while (value >= 1024 && index < units.length - 1) {
      value /= 1024;
      index += 1;
    }
    return value.toFixed(1) + " " + units[index];
  }

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }
</script>
</body>
</html>
